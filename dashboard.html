<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>대시보드</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f1117;
      color: #e2e8f0;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 32px 24px;
    }

    h1 {
      font-size: 1.4rem;
      color: #94a3b8;
      margin-bottom: 28px;
      letter-spacing: 0.05em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      max-width: 960px;
    }

    .card {
      background: #1e2130;
      border-radius: 16px;
      padding: 24px;
      border: 1px solid #2d3148;
    }

    .card-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #64748b;
      margin-bottom: 16px;
    }

    /* 날씨 */
    .weather-temp {
      font-size: 3rem;
      font-weight: 700;
      color: #f8fafc;
      line-height: 1;
    }

    .weather-desc {
      font-size: 1rem;
      color: #94a3b8;
      margin-top: 8px;
      text-transform: capitalize;
    }

    .weather-meta {
      display: flex;
      gap: 20px;
      margin-top: 16px;
    }

    .weather-meta span {
      font-size: 0.85rem;
      color: #64748b;
    }

    .weather-meta b {
      color: #cbd5e1;
    }

    /* 과제 */
    .assignment-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .assignment-item {
      background: #262a3f;
      border-radius: 10px;
      padding: 12px 14px;
    }

    .assignment-course {
      font-size: 0.7rem;
      color: #7c86b0;
      margin-bottom: 4px;
    }

    .assignment-name {
      font-size: 0.9rem;
      color: #e2e8f0;
    }

    .assignment-due {
      font-size: 0.75rem;
      color: #64748b;
      margin-top: 4px;
    }

    .badge-urgent {
      display: inline-block;
      background: #ef4444;
      color: white;
      font-size: 0.65rem;
      padding: 2px 7px;
      border-radius: 999px;
      margin-left: 6px;
      vertical-align: middle;
    }

    .empty {
      color: #4a5568;
      font-size: 0.9rem;
      padding: 8px 0;
    }

    .updated {
      font-size: 0.75rem;
      color: #374151;
      margin-top: 28px;
    }

    .refresh-btn {
      display: inline-block;
      margin-top: 16px;
      background: #2d3148;
      color: #94a3b8;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 0.8rem;
      cursor: pointer;
    }

    .refresh-btn:hover {
      background: #3a3f5c;
      color: #e2e8f0;
    }
  </style>
</head>
<body>
  <h1>대시보드</h1>

  <div class="grid">
    <!-- 날씨 -->
    <div class="card">
      <div class="card-title">오늘 날씨 · 서울 종로구</div>
      <div id="weather-content"><div class="empty">불러오는 중...</div></div>
    </div>

    <!-- 오늘 마감 -->
    <div class="card">
      <div class="card-title">오늘 마감 과제</div>
      <ul class="assignment-list" id="today-list"></ul>
    </div>

    <!-- 예정 과제 -->
    <div class="card" style="grid-column: 1 / -1;">
      <div class="card-title">다가오는 마감</div>
      <ul class="assignment-list" id="upcoming-list"></ul>
    </div>
  </div>

  <div class="updated" id="updated-time"></div>

  <script>
    async function load() {
      try {
        const res = await fetch('dashboard_data.json?t=' + Date.now());
        const d = await res.json();

        // 날씨
        const w = d.weather;
        document.getElementById('weather-content').innerHTML = `
          <div class="weather-temp">${w.temp}°C</div>
          <div class="weather-desc">${w.desc}</div>
          <div class="weather-meta">
            <span>체감 <b>${w.feels}°C</b></span>
            <span>습도 <b>${w.humidity}%</b></span>
          </div>
        `;

        // 오늘 마감
        const todayList = document.getElementById('today-list');
        if (d.due_today.length === 0) {
          todayList.innerHTML = '<div class="empty">오늘 마감 과제 없음</div>';
        } else {
          todayList.innerHTML = d.due_today.map(a => `
            <li class="assignment-item">
              <div class="assignment-course">${a.course}</div>
              <div class="assignment-name">${a.name}<span class="badge-urgent">오늘</span></div>
              <div class="assignment-due">${a.due} 마감</div>
            </li>
          `).join('');
        }

        // 예정 과제
        const upcomingList = document.getElementById('upcoming-list');
        if (d.upcoming.length === 0) {
          upcomingList.innerHTML = '<div class="empty">예정된 과제 없음</div>';
        } else {
          upcomingList.innerHTML = d.upcoming.map(a => `
            <li class="assignment-item">
              <div class="assignment-course">${a.course}</div>
              <div class="assignment-name">${a.name}</div>
              <div class="assignment-due">${a.due} 마감</div>
            </li>
          `).join('');
        }

        document.getElementById('updated-time').textContent = '마지막 업데이트: ' + d.updated;
      } catch(e) {
        document.getElementById('weather-content').innerHTML = '<div class="empty">dashboard_data.json을 먼저 생성하세요</div>';
      }
    }

    load();
  </script>
</body>
</html>
